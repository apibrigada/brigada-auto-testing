name: Playwright E2E

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://web-cms-murex.vercel.app/' }}
      E2E_DISABLE_WEBSERVER: "true"
      E2E_DASHBOARD_STATS_TIMEOUT_MS: ${{ vars.E2E_DASHBOARD_STATS_TIMEOUT_MS || '45000' }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
      E2E_LOGIN_EMAIL_ROLE_1: ${{ secrets.E2E_LOGIN_EMAIL_ROLE_1 }}
      E2E_LOGIN_PASSWORD_ROLE_1: ${{ secrets.E2E_LOGIN_PASSWORD_ROLE_1 }}
      E2E_LOGIN_EMAIL_ROLE_2: ${{ secrets.E2E_LOGIN_EMAIL_ROLE_2 }}
      E2E_LOGIN_PASSWORD_ROLE_2: ${{ secrets.E2E_LOGIN_PASSWORD_ROLE_2 }}
      E2E_LOGIN_EMAIL_ROLE_3: ${{ secrets.E2E_LOGIN_EMAIL_ROLE_3 }}
      E2E_LOGIN_PASSWORD_ROLE_3: ${{ secrets.E2E_LOGIN_PASSWORD_ROLE_3 }}

    steps:
      - name: Checkout brigada-auto-testing
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (testing repo)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
